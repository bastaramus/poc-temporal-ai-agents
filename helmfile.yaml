environments:
  default:
    values:
      - environments/local.yaml

---
repositories:
  - name: bitnami
    url: https://charts.bitnami.com/bitnami
  - name: codecentric
    url: https://codecentric.github.io/helm-charts
  - name: temporal
    url: https://go.temporal.io/helm-charts

releases:
  - name: postgresql
    namespace: agent-poc
    createNamespace: true
    chart: bitnami/postgresql
    version: 18.7.6
    values:
      - values/postgresql.yaml

  - name: keycloak
    namespace: agent-poc
    chart: codecentric/keycloakx
    version: 7.2.0
    needs:
      - agent-poc/postgresql
    values:
      - values/keycloak.yaml

  - name: temporal
    namespace: agent-poc
    chart: temporal/temporal
    version: 1.2.0
    needs:
      - agent-poc/postgresql
    values:
      - values/temporal.yaml

  - name: public-api-server
    namespace: agent-poc
    chart: ./charts/public-api-server
    needs:
      - agent-poc/keycloak
      - agent-poc/temporal
    values:
      - values/public-api.yaml

  - name: internal-api-server
    namespace: agent-poc
    chart: ./charts/internal-api-server
    needs:
      - agent-poc/keycloak
      - agent-poc/postgresql
      - agent-poc/temporal
    values:
      - values/internal-api.yaml

  - name: worker
    namespace: agent-poc
    chart: ./charts/worker
    needs:
      - agent-poc/temporal
      - agent-poc/internal-api-server
    values:
      - values/worker.yaml

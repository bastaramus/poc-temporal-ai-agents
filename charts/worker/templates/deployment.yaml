apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: "{{ $v }}"
            {{- end }}
          # The pod's only credential at boot. Audience is checked by the
          # internal-api-server's TokenReview, so a token issued for some
          # other audience would be rejected.
          volumeMounts:
            - name: sa-token
              mountPath: /var/run/secrets/internal-api
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: sa-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  audience: {{ .Values.projectedSaToken.audience }}
                  expirationSeconds: {{ .Values.projectedSaToken.expirationSeconds }}

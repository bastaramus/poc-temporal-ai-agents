image:
  # See note in values/public-api.yaml about the `localhost/` prefix.
  repository: localhost/poc/internal-api-server
  tag: dev
  pullPolicy: IfNotPresent

service:
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceAccount:
  create: true
  name: internal-api-sa

env:
  WORKER_AUDIENCE: worker-pod-client
  TEMPORAL_HOST: temporal-frontend.agent-poc.svc.cluster.local:7233
  TEMPORAL_NAMESPACE: default
  PG_HOST: postgresql.agent-poc.svc.cluster.local
  PG_PORT: "5432"
  PG_DATABASE: poc
  PG_USER: app_runtime
  PG_PASSWORD: change-me-runtime
  PORT: "8080"
  ## Allow this SA name to call /bind-identity. Multiple SAs comma-separated.
  ALLOWED_WORKER_SAS: "system:serviceaccount:agent-poc:worker-sa"
  ## Narrowed-JWT signing. Same secret signs the issued JWT and verifies it
  ## back at /tools/* — only one process holds it. TODO: External Secrets in prod.
  NARROWED_SIGNING_SECRET: "narrowed-jwt-shared-secret-change-me"
  NARROWED_ISSUER: "internal-api-server"
  NARROWED_TTL_SECONDS: "900"

## codecentric/keycloakx 7.2.0 — single replica, dev mode (no TLS), realm imported on boot.
## TODO: production = HA, persistent realm config in DB, TLS.

replicas: 1

# 'start-dev' for the PoC; production should use 'start' with proper config.
command:
  - "/opt/keycloak/bin/kc.sh"
args:
  - "start-dev"
  - "--import-realm"

# Postgres backend for Keycloak's own state.
database:
  vendor: postgres
  hostname: postgresql.agent-poc.svc.cluster.local
  port: 5432
  database: keycloak
  username: postgres
  password: change-me-postgres
  # TODO: switch to existingSecret in production.

# Admin bootstrap + dev runtime tweaks.
# NOTE: KC_HTTP_ENABLED and KC_PROXY_HEADERS are set by the chart itself, so
# don't add them here — Kubernetes rejects duplicate env keys.
#
# Issuer pinning. Without KC_HOSTNAME, Keycloak builds the `iss` claim from
# the request's Host header — so a token fetched at localhost:8080 carries
# `iss=http://localhost:8080/...` and a token fetched in-cluster carries
# the cluster DNS. Our services must validate against ONE issuer string, so
# we pin the hostname here AND in the services' EXPECTED_ISSUER env. The
# JWKS fetch URL still uses the in-cluster DNS so services don't need to
# reach localhost.
extraEnv: |
  - name: KEYCLOAK_ADMIN
    value: admin
  - name: KEYCLOAK_ADMIN_PASSWORD
    value: admin
  - name: KC_HOSTNAME
    value: "http://localhost:8080"
  - name: KC_HOSTNAME_STRICT
    value: "false"
  - name: KC_HOSTNAME_STRICT_BACKCHANNEL
    value: "false"

# Mount the realm-import ConfigMap into /opt/keycloak/data/import — kc start-dev
# --import-realm reads anything in that directory at boot.
extraVolumes: |
  - name: realm
    configMap:
      name: keycloak-realm

extraVolumeMounts: |
  - name: realm
    mountPath: /opt/keycloak/data/import

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Default in keycloakx is /auth — we serve the realm at /, matching the JWKS
# URL hard-coded in the services' env vars.
http:
  relativePath: "/"

service:
  type: ClusterIP
  httpPort: 8080

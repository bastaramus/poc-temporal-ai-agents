image:
  repository: poc/public-api-server
  tag: dev
  pullPolicy: IfNotPresent

service:
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

env:
  KEYCLOAK_ISSUER: http://keycloak-keycloakx-http.agent-poc.svc.cluster.local:8080/realms/agent-poc
  KEYCLOAK_JWKS_URL: http://keycloak-keycloakx-http.agent-poc.svc.cluster.local:8080/realms/agent-poc/protocol/openid-connect/certs
  EXPECTED_AUDIENCE: public-api-client
  TEMPORAL_HOST: temporal-frontend.agent-poc.svc.cluster.local:7233
  TEMPORAL_NAMESPACE: default
  TASK_QUEUE: agent-tasks
  PORT: "8080"

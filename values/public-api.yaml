image:
  # Podman+minikube store loaded images under the `localhost/` registry
  # prefix; the deployment must reference them under that exact name or
  # kubelet falls through to docker.io.
  repository: localhost/poc/public-api-server
  tag: dev
  pullPolicy: IfNotPresent

service:
  port: 8080

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

env:
  # Issuer is pinned to localhost:8080 so the same JWT validates whether it
  # was minted via port-forward or in-cluster (see values/keycloak.yaml).
  KEYCLOAK_ISSUER: http://localhost:8080/realms/agent-poc
  KEYCLOAK_JWKS_URL: http://keycloak-keycloakx-http.agent-poc.svc.cluster.local:8080/realms/agent-poc/protocol/openid-connect/certs
  EXPECTED_AUDIENCE: public-api-client
  TEMPORAL_HOST: temporal-frontend.agent-poc.svc.cluster.local:7233
  TEMPORAL_NAMESPACE: default
  TASK_QUEUE: agent-tasks
  PORT: "8080"
